services:
  redis:
    image: redis:7-alpine
    container_name: redis-auction-redis
    ports:
      - "6383:6379"
    command:
      - redis-server
      - --notify-keyspace-events
      - Ex
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      # RDB snapshots in addition to AOF (point-in-time backups).
      - --save
      - "60 100"
      - --save
      - "300 10"
      # SLOWLOG: log every command > 10ms.
      - --slowlog-log-slower-than
      - "10000"
      - --slowlog-max-len
      - "128"
      # LATENCY monitor threshold (ms).
      - --latency-monitor-threshold
      - "100"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: redis-auction-pg
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
      POSTGRES_DB: auction
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  pg-data:
